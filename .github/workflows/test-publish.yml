name: Test Publish to npm

on:
  push:
    tags:
      - 'test-npm/v*'
  workflow_dispatch:

jobs:
  test-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for provenance
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          path: test-npm
          npm_access: public
